name: Bug report
description: Report something that isn't working as expected.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report! Please fill in as much detail as you can.
  - type: input
    id: version
    attributes:
      label: Mechvibes version
      description: Found in the app's About screen or the installer/file name you downloaded.
      placeholder: e.g. 2.4.2
    validations:
      required: true
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug and, if applicable, what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open Mechvibes
        2. ...
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant output from the app's log file, if available.
      render: shell
    validations:
      required: false
