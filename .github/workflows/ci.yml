name: Critical fix verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: critical-fix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Syntax, soundpacks, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verification
        run: npm run verify

      - name: Check audio scheduler budget
        run: npm run benchmark:audio

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  windows-build:
    name: Windows x64 build
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verification
        run: npm run verify

      - name: Build Windows x64 installer
        run: npm run build:win -- --publish never

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: mechvibes-windows-x64
          path: dist/**/*.exe
          if-no-files-found: error
          retention-days: 14
