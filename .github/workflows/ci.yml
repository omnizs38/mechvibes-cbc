name: Critical fix verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: critical-fix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Syntax, soundpacks, and tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verification
        run: npm run verify

      - name: Check audio scheduler budget
        run: npm run benchmark:audio

  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Reject newly introduced vulnerable dependencies
        uses: actions/dependency-review-action@v5
        with:
          fail-on-severity: high

  build:
    name: Build test on ${{ matrix.os }}
    needs: quality
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-cmd: npm run build:win -- --publish never
            artifact-name: mechvibes-windows-x64
            artifact-path: dist/**/*.exe
          - os: macos-latest
            build-cmd: npm run build:mac -- --publish never
            artifact-name: mechvibes-macos-x64
            artifact-path: dist/**/*.dmg
          - os: ubuntu-latest
            build-cmd: npm run build:linux -- --publish never
            artifact-name: mechvibes-linux-x64
            artifact-path: |
              dist/**/*.deb
              dist/**/*.AppImage
              dist/**/*.snap
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Run verification
        run: npm run verify

      - name: Build packages
        run: ${{ matrix.build-cmd }}

      - name: Upload compiled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error
          retention-days: 14
