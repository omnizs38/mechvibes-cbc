name: Multi-platform release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-beta.*"
      - "v[0-9]+.[0-9]+.[0-9]+-rc.*"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  validate:
    name: Validate release source
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Verify tag and package version
        id: verify-tag
        run: node tools/verify-release-tag.js "${GITHUB_REF_NAME}"

      - name: Explain tag/version mismatch
        if: failure() && steps.verify-tag.outcome == 'failure'
        run: |
          {
            echo "### Release validation failed"
            echo ""
            echo "The pushed tag \`${GITHUB_REF_NAME}\` (commit \`${GITHUB_SHA}\`) does not"
            echo "satisfy \`tools/verify-release-tag.js\`. This almost always means the tag"
            echo "was created against a commit where \`package.json\`'s \`version\` had not"
            echo "yet been bumped to match the tag name."
            echo ""
            echo "To fix: delete the bad tag, make sure the version-bump commit is on"
            echo "\`main\` first, then re-create the tag on that commit:"
            echo ""
            echo '```sh'
            echo "git tag -d ${GITHUB_REF_NAME}"
            echo "git push origin :refs/tags/${GITHUB_REF_NAME}"
            echo "git tag ${GITHUB_REF_NAME} <correct-commit-sha>"
            echo "git push origin ${GITHUB_REF_NAME}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Run release gates
        run: npm run verify

      - name: Check audio scheduler budget
        run: npm run benchmark:audio

  build:
    name: Build assets on ${{ matrix.os }}
    needs: validate
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    env:
      # Without this, electron-builder tries to auto-discover a codesign
      # identity in the runner's empty keychain and can fail/hang on macOS
      # when no Apple Developer certificate is configured in secrets.
      CSC_IDENTITY_AUTO_DISCOVERY: false
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
        include:
          - os: windows-latest
            build-cmd: npm run build:win -- --x64 --publish never
            artifact-name: windows-release-assets
            artifact-path: |
              dist/*.exe
              dist/*.blockmap
              dist/*.yml
          - os: macos-latest
            build-cmd: npm run build:mac -- --x64 --publish never
            artifact-name: macos-release-assets
            artifact-path: |
              dist/*.dmg
              dist/*.blockmap
              dist/*.yml
          - os: ubuntu-latest
            build-cmd: npm run build:linux -- --x64 --publish never
            artifact-name: linux-release-assets
            artifact-path: |
              dist/*.deb
              dist/*.AppImage
              dist/*.snap
              dist/*.yml
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7

      - name: Use supported Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22.22.0
          cache: npm

      - name: Install native X11 and build-essential header libraries (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libxext-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev libxrandr-dev libxinerama-dev libxi-dev libxt-dev

      - name: Install locked dependencies
        run: npm ci --no-audit --no-fund

      - name: Build release packages
        run: ${{ matrix.build-cmd }}

      - name: Clean up temporary debug configurations to avoid conflicts
        shell: bash
        run: rm -f dist/builder-debug.yml || true

      - name: Generate checksums and SBOM (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Get-ChildItem dist -File |
            Where-Object { $_.Name -ne "SHA256SUMS.txt" } |
            Sort-Object Name |
            ForEach-Object {
              $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
              "$hash  $($_.Name)"
            } | Set-Content dist/SHA256SUMS.txt -Encoding ascii
          npm sbom --sbom-format cyclonedx > dist/sbom.cdx.json

      - name: Generate checksums and SBOM (Posix)
        if: matrix.os != 'windows-latest'
        shell: bash
        run: |
          find dist -maxdepth 1 -type f ! -name "SHA256SUMS.txt" | sort | while read -r file; do
            filename=$(basename "$file")
            sha256sum "$file" | awk -v fn="$filename" '{print $1 "  " fn}' >> dist/SHA256SUMS.txt
          done
          npm sbom --sbom-format cyclonedx > dist/sbom.cdx.json

      - name: Upload compiled OS release assets
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact-name }}
          path: |
            ${{ matrix.artifact-path }}
            dist/SHA256SUMS.txt
            dist/sbom.cdx.json
          if-no-files-found: error
          retention-days: 14

  publish:
    name: Stage draft GitHub Release for manual publish
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: release
    permissions:
      contents: write
    steps:
      - name: Create local temporary directory for staging assets
        run: mkdir -p dist-merged

      - name: Download Windows assets
        uses: actions/download-artifact@v8
        with:
          name: windows-release-assets
          path: dist-merged

      - name: Download macOS assets
        uses: actions/download-artifact@v8
        with:
          name: macos-release-assets
          path: dist-merged

      - name: Download Linux assets
        uses: actions/download-artifact@v8
        with:
          name: linux-release-assets
          path: dist-merged

      - name: Generate centralized multios SHA256SUMS manifest
        shell: bash
        run: |
          cd dist-merged
          rm -f SHA256SUMS.txt sbom.cdx.json builder-debug.yml
          find . -maxdepth 1 -type f | sort | while read -r file; do
            filename=$(basename "$file")
            sha256sum "$file" | awk -v fn="$filename" '{print $1 "  " fn}' >> SHA256SUMS.txt
          done
          npm sbom --sbom-format cyclonedx > sbom.cdx.json || true

      - name: Stage release as a draft (always — never auto-publish)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          args=("${GITHUB_REF_NAME}" --verify-tag --generate-notes --title "Mechvibes ${GITHUB_REF_NAME}" --draft)
          if [[ "${GITHUB_REF_NAME}" == *-beta.* || "${GITHUB_REF_NAME}" == *-rc.* ]]; then
            args+=(--prerelease)
          fi
          gh release create "${args[@]}" dist-merged/*
          echo "### Release staged as DRAFT — requires manual publish" >> "$GITHUB_STEP_SUMMARY"
          echo "This workflow has safely built, compiled, and merged artifacts" >> "$GITHUB_STEP_SUMMARY"
          echo "from all three major operating systems (Windows, macOS, and Linux)." >> "$GITHUB_STEP_SUMMARY"
          echo "A human must manually publish the draft release in the GitHub UI." >> "$GITHUB_STEP_SUMMARY"
